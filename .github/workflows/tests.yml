name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zip, curl
          coverage: none

      - name: Lint all PHP files
        run: |
          set -e
          find . -name '*.php' -not -path './.git/*' -print0 \
            | xargs -0 -n1 php -l > /dev/null

      - name: Run test suite
        run: php tests/run.php
